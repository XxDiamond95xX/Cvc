      <text x="187" y="358" textAnchor="middle" fill="#00ff88" fontSize="9" fontFamily="monospace">Panne 1/12 → +14,3% vitesse des 11 restants</text>
      <rect x="366" y="292" width="294" height="72" rx="8" fill="rgba(0,255,136,0.07)" stroke="rgba(0,255,136,0.35)" strokeWidth="1"/>
      <text x="513" y="312" textAnchor="middle" fill="#00ff88" fontSize="11" fontWeight="bold" fontFamily="monospace">REDONDANCE N+1</text>
      <text x="513" y="327" textAnchor="middle" fill="#aaa" fontSize="9" fontFamily="monospace">11 fans actifs + 1 spare (colonne droite)</text>
      <text x="513" y="343" textAnchor="middle" fill="#aaa" fontSize="9" fontFamily="monospace">Panne → spare démarre automatiquement</text>
      <text x="513" y="358" textAnchor="middle" fill="#00ff88" fontSize="9" fontFamily="monospace">Hot-swap : remplacement sous tension &lt;30s</text>
    </svg>
  );
}

      <rect x="25" y="152" width="650" height="30" rx="4" fill="rgba(255,204,0,0.04)"/>
      <line x1="30" y1="167" x2="658" y2="167" stroke="#ffcc00" strokeWidth="2" strokeDasharray="8,4" opacity="0.5"/>
      <polygon points="652,162 662,167 652,172" fill="#ffcc00" opacity="0.5"/>
      <text x="350" y="198" textAnchor="middle" fill="rgba(255,204,0,0.4)" fontSize="10" fontFamily="monospace">→ Flux d'air traité →</text>
      <rect x="20" y="283" width="660" height="70" rx="6" fill="rgba(255,204,0,0.04)" stroke="rgba(255,204,0,0.18)" strokeWidth="1"/>
      <text x="350" y="300" textAnchor="middle" fill="#ffcc00" fontSize="10" fontWeight="bold" fontFamily="monospace">PARAMÈTRES DE RÉGULATION — AUTOMATE DDC</text>

}

const DIAGRAMS = {
  "circuit-frigo": DiagCircuitFrigo,
  "crac": DiagCRAC,
  "crah": DiagCRAH,
  "fanwall": DiagFanwall,
  "cvc": DiagCVC,
};

// ── Rendu du contenu de cours ───────────────────────────────────────────────
function CourseContent({items, color}) {
  return items.map((item, i) => {
    if (item.type === "h") return (
      <div key={i} style={{color, fontFamily:"monospace", fontSize:11, fontWeight:"bold", marginTop:18, marginBottom:7, letterSpacing:1, borderBottom:`1px solid rgba(255,255,255,0.06)`, paddingBottom:4}}>
        ▸ {item.text}
      </div>
    );
    if (item.type === "p") return (
      <p key={i} style={{color:"#ccc", fontFamily:"monospace", fontSize:10, lineHeight:1.75, margin:"6px 0"}}>{item.text}</p>
    );
    if (item.type === "b") return (
      <div key={i} style={{display:"flex", gap:8, marginBottom:5, paddingLeft:12}}>
        <span style={{color, flexShrink:0, fontSize:10}}>•</span>
        <p style={{color:"#ccc", fontFamily:"monospace", fontSize:10, margin:0, lineHeight:1.65}}>
          <strong style={{color:"#fff"}}>{item.bold}</strong>{item.text}
        </p>
      </div>
    );
    if (item.type === "li") return (
      <div key={i} style={{display:"flex", gap:8, marginBottom:6, paddingLeft:8}}>
        <span style={{color, fontFamily:"monospace", fontSize:10, flexShrink:0, minWidth:18, fontWeight:"bold"}}>{item.n}.</span>
        <p style={{color:"#ccc", fontFamily:"monospace", fontSize:10, margin:0, lineHeight:1.65}}>
          <strong style={{color:"#fff"}}>{item.bold}</strong>{item.text}
        </p>
      </div>
    );
    if (item.type === "formula") return (
      <div key={i} style={{background:`rgba(255,204,0,0.06)`, border:"1px solid rgba(255,204,0,0.25)", borderRadius:8, padding:"10px 16px", margin:"12px 0", textAlign:"center"}}>
        <div style={{color:"#ffcc00", fontFamily:"monospace", fontSize:12, fontWeight:"bold"}}>{item.text}</div>
        {item.sub && <div style={{color:"#888", fontFamily:"monospace", fontSize:9, marginTop:5}}>{item.sub}</div>}
      </div>
    );
    return null;
  });
}

// ── Application principale ──────────────────────────────────────────────────
function App() {
  const [modIdx, setModIdx]     = React.useState(0);
  const [chapIdx, setChapIdx]   = React.useState(0);
  const [view, setView]         = React.useState("learn");
  const [answers, setAnswers]   = React.useState({});
  const [progress, setProgress] = React.useState({});
  const [showDiag, setShowDiag] = React.useState(true);
  const contentRef              = React.useRef();

  const mod     = MODULES[modIdx];
  const chapter = mod.chapters[chapIdx];
  const Diagram = DIAGRAMS[mod.id];
  const total   = MODULES.reduce((s,m)=>s+m.chapters.length, 0);
  const done    = Object.keys(progress).length;
  const pct     = Math.round(done/total*100);
  const isFirst = modIdx===0 && chapIdx===0;
  const isLast  = modIdx===MODULES.length-1 && chapIdx===mod.chapters.length-1;

  React.useEffect(()=>{ setChapIdx(0); setView("learn"); setAnswers({}); contentRef.current?.scrollTo(0,0); }, [modIdx]);
  React.useEffect(()=>{ setView("learn"); setAnswers({}); contentRef.current?.scrollTo(0,0); }, [chapIdx]);

  const markDone = () => setProgress(p=>({...p,[`${mod.id}-${chapter.id}`]:true}));

  const handleAnswer = (qi, ci) => {
    if (answers[qi]!==undefined) return;
    setAnswers(a=>({...a,[qi]:ci}));
    if (ci===chapter.quiz[qi].answer) markDone();
  };

  const goNext = () => {
    if (chapIdx<mod.chapters.length-1) setChapIdx(c=>c+1);
    else if (modIdx<MODULES.length-1) setModIdx(m=>m+1);
  };
  const goPrev = () => {
    if (chapIdx>0) setChapIdx(c=>c-1);
    else if (modIdx>0) { const pm=MODULES[modIdx-1]; setModIdx(m=>m-1); setTimeout(()=>setChapIdx(pm.chapters.length-1),10); }
  };

  const allDone = chapter.quiz && Object.keys(answers).length===chapter.quiz.length;
  const score   = chapter.quiz ? chapter.quiz.filter((q,i)=>answers[i]===q.answer).length : 0;
  const rgb     = {c:"0,212,255","#00d4ff":"0,212,255","#ff6b2b":"255,107,43","#00ff88":"0,255,136","#bf5fff":"191,95,255","#ffcc00":"255,204,0"};
  const c       = rgb[mod.color]||"255,255,255";

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>

      {/* Header */}
      <div style={{background:"#08080f",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"0 20px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:32,height:32,borderRadius:7,background:`linear-gradient(135deg,${mod.color},#003366)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🏗️</div>
          <div>
            <div style={{fontSize:11,fontWeight:"bold",letterSpacing:2}}>TECHNICIEN CVC</div>
            <div style={{fontSize:8,color:"#444",letterSpacing:1}}>FORMATION PROFESSIONNELLE CERTIFIÉE</div>
          </div>
        </div>
        <div style={{flex:1,maxWidth:300,margin:"0 30px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:8,color:"#444"}}>PROGRESSION</span>
            <span style={{fontSize:8,color:mod.color}}>{pct}% — {done}/{total} chapitres</span>
          </div>
          <div style={{height:3,background:"#1a1a2e",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:mod.color,borderRadius:2,transition:"width 0.5s"}}/>
          </div>
        </div>
        <div style={{fontSize:8,color:"#2a2a2a"}}>ASHRAE • EN 1886 • NF EN 378</div>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>

        {/* Sidebar */}
        <div style={{width:245,background:"#07070d",borderRight:"1px solid rgba(255,255,255,0.05)",overflow:"auto",flexShrink:0}}>
          <div style={{fontSize:8,color:"#333",padding:"12px 14px 5px",letterSpacing:2}}>MODULES</div>
          {MODULES.map((m,i)=>(
            <div key={m.id} onClick={()=>setModIdx(i)} style={{padding:"8px 14px",cursor:"pointer",borderLeft:`3px solid ${modIdx===i?m.color:"transparent"}`,background:modIdx===i?`rgba(${rgb[m.color]||"255,255,255"},0.07)`:"transparent",display:"flex",alignItems:"center",gap:10,transition:"all 0.2s"}}>
              <span style={{fontSize:14}}>{m.icon}</span>
              <div>
                <div style={{fontSize:10,fontWeight:"bold",color:modIdx===i?m.color:"#666"}}>{m.title}</div>
                <div style={{fontSize:8,color:"#333",marginTop:1}}>{m.subtitle}</div>
              </div>
            </div>
          ))}
          <div style={{fontSize:8,color:"#333",padding:"12px 14px 5px",letterSpacing:2,borderTop:"1px solid rgba(255,255,255,0.04)",marginTop:6}}>CHAPITRES</div>
          {mod.chapters.map((ch,i)=>{
            const isDone=progress[`${mod.id}-${ch.id}`];
            return (
              <div key={ch.id} onClick={()=>setChapIdx(i)} style={{padding:"7px 14px",cursor:"pointer",background:chapIdx===i?"rgba(255,255,255,0.04)":"transparent",display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:14,height:14,borderRadius:"50%",background:isDone?mod.color:"transparent",border:`1px solid ${isDone?mod.color:"#2a2a2a"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:isDone?"#000":"#444",flexShrink:0}}>{isDone?"✓":i+1}</div>
                <span style={{fontSize:9,color:chapIdx===i?"#ccc":"#555",lineHeight:1.3}}>{ch.title}</span>
              </div>
            );
          })}
        </div>

        {/* Main */}
        <div ref={contentRef} style={{flex:1,overflow:"auto",background:"#06060e"}}>
          {/* Banner */}
          <div style={{background:mod.gradient,padding:"16px 28px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
              <span style={{fontSize:22}}>{mod.icon}</span>
              <div>
                <div style={{fontSize:16,fontWeight:"bold"}}>{mod.title}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>{mod.subtitle}</div>
              </div>
            </div>
            <div style={{display:"inline-block",background:"rgba(0,0,0,0.4)",border:`1px solid ${mod.color}`,borderRadius:20,padding:"3px 12px",fontSize:9,color:mod.color,letterSpacing:1}}>📖 {chapter.title}</div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.05)",background:"#08080f"}}>
            {[["learn","📘 COURS"],["quiz",`🧠 QUIZ (${chapter.quiz?.length||0} questions)`]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{padding:"9px 20px",background:view===v?`rgba(${c},0.1)`:"transparent",border:"none",borderBottom:view===v?`2px solid ${mod.color}`:"2px solid transparent",color:view===v?mod.color:"#555",cursor:"pointer",fontSize:9,fontFamily:"monospace",letterSpacing:1,transition:"all 0.2s"}}>{l}</button>
            ))}
          </div>

          <div style={{padding:"20px 28px",maxWidth:840,margin:"0 auto"}}>
            {view==="learn" && (
              <>
                {/* Schéma */}
                {Diagram && (
                  <div style={{marginBottom:20}}>
                    <div onClick={()=>setShowDiag(d=>!d)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:10,color:mod.color,fontSize:9,letterSpacing:1}}>
                      {showDiag?"▼":"▶"} SCHÉMA TECHNIQUE <span style={{color:"#333",fontSize:8}}>(cliquer)</span>
                    </div>
                    {showDiag&&(
                      <div style={{background:"#090912",border:`1px solid rgba(${c},0.18)`,borderRadius:10,padding:14,overflow:"hidden"}}>
                        <Diagram/>
                      </div>
                    )}
                  </div>
                )}

                {/* Cours */}
                <div style={{background:"#0a0a14",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,padding:20,marginBottom:16}}>
                  <div style={{fontSize:9,color:mod.color,letterSpacing:1,marginBottom:14}}>📖 COURS THÉORIQUE</div>
                  <CourseContent items={chapter.content} color={mod.color}/>
                </div>

                {/* Points clés */}
                <div style={{background:`rgba(${c},0.05)`,border:`1px solid rgba(${c},0.2)`,borderRadius:10,padding:16,marginBottom:18}}>
                  <div style={{fontSize:9,color:mod.color,letterSpacing:1,marginBottom:10}}>⭐ POINTS CLÉS À RETENIR</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                    {chapter.keyPoints.map((kp,i)=>(
                      <div key={i} style={{background:"rgba(0,0,0,0.3)",borderRadius:6,padding:"7px 10px",fontSize:9,color:"#ccc",fontFamily:"monospace",display:"flex",gap:7}}>
                        <span style={{color:mod.color,flexShrink:0}}>▸</span>{kp}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Nav */}
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <button onClick={goPrev} disabled={isFirst} style={{padding:"8px 16px",background:"transparent",border:"1px solid #2a2a3a",borderRadius:6,color:isFirst?"#333":"#777",cursor:isFirst?"not-allowed":"pointer",fontFamily:"monospace",fontSize:9}}>← Précédent</button>
                  <button onClick={()=>setView("quiz")} style={{padding:"8px 18px",background:mod.color,border:"none",borderRadius:6,color:"#000",cursor:"pointer",fontFamily:"monospace",fontSize:9,fontWeight:"bold",letterSpacing:1}}>PASSER LE QUIZ →</button>
                </div>
              </>
            )}

            {view==="quiz" && (
              <>
                <div style={{background:"#0a0a14",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,padding:20,marginBottom:14}}>
                  <div style={{fontSize:9,color:mod.color,letterSpacing:1,marginBottom:4}}>🧠 ÉVALUATION DES CONNAISSANCES</div>
                  <div style={{fontSize:8,color:"#444",marginBottom:20}}>{chapter.title} — {chapter.quiz.length} question{chapter.quiz.length>1?"s":""}</div>

                  {chapter.quiz.map((q,qi)=>{
                    const ans=answers[qi]!==undefined;
                    const ok=answers[qi]===q.answer;
                    return (
                      <div key={qi} style={{marginBottom:22,padding:16,background:ans?(ok?"rgba(0,255,136,0.05)":"rgba(255,60,60,0.05)"):"rgba(255,255,255,0.02)",border:`1px solid ${ans?(ok?"#00ff88":"#ff4444"):"rgba(255,255,255,0.05)"}`,borderRadius:8}}>
                        <div style={{fontSize:11,color:"#eee",marginBottom:14,lineHeight:1.55}}>
                          <span style={{color:mod.color,marginRight:8,fontSize:10}}>Q{qi+1}.</span>{q.q}
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:7}}>
                          {q.choices.map((ch,ci)=>{
                            const sel=answers[qi]===ci, isA=ci===q.answer;
                            let bc="#1a1a2e",bg="rgba(255,255,255,0.02)",tc="#888";
                            if(ans){if(isA){bc="#00ff88";bg="rgba(0,255,136,0.09)";tc="#00ff88";}else if(sel){bc="#ff4444";bg="rgba(255,60,60,0.09)";tc="#ff4444";}}
                            return (
                              <div key={ci} onClick={()=>handleAnswer(qi,ci)} style={{padding:"9px 14px",background:bg,border:`1px solid ${bc}`,borderRadius:6,cursor:ans?"default":"pointer",color:tc,fontSize:10,fontFamily:"monospace",display:"flex",alignItems:"center",gap:10,transition:"all 0.2s"}}>
                                <span style={{width:17,height:17,borderRadius:4,background:ans&&isA?"#00ff88":ans&&sel?"#ff4444":"#0a0a14",border:`1px solid ${bc}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",flexShrink:0}}>
                                  {ans?(isA?"✓":sel?"✗":""):String.fromCharCode(65+ci)}
                                </span>{ch}
                              </div>
                            );
                          })}
                        </div>
                        {ans&&(
                          <div style={{marginTop:12,padding:"9px 14px",background:"rgba(0,0,0,0.3)",borderRadius:6,fontSize:9,color:"#bbb",lineHeight:1.6,borderLeft:`3px solid ${ok?"#00ff88":"#ff4444"}`}}>
                            <span style={{color:ok?"#00ff88":"#ff4444",marginRight:6}}>{ok?"✅ CORRECT !":"❌ INCORRECT"}</span>
                            {q.explanation}
                          </div>
                        )}
                      </div>
                    );
                  })}

                  {allDone&&(
                    <div style={{padding:18,background:score===chapter.quiz.length?"rgba(0,255,136,0.07)":"rgba(255,204,0,0.07)",border:`1px solid ${score===chapter.quiz.length?"#00ff88":"#ffcc00"}`,borderRadius:8,textAlign:"center"}}>
                      <div style={{fontSize:22,marginBottom:8}}>{score===chapter.quiz.length?"🏆":"📚"}</div>
                      <div style={{fontSize:15,color:score===chapter.quiz.length?"#00ff88":"#ffcc00",marginBottom:4}}>Score : {score}/{chapter.quiz.length}</div>
                      <div style={{fontSize:9,color:"#777",marginBottom:14}}>{score===chapter.quiz.length?"Excellent ! Chapitre validé.":"Révisez le cours pour consolider vos connaissances."}</div>
                      {!isLast&&<button onClick={goNext} style={{padding:"8px 18px",background:mod.color,border:"none",borderRadius:6,color:"#000",cursor:"pointer",fontFamily:"monospace",fontSize:9,fontWeight:"bold"}}>{chapIdx<mod.chapters.length-1?"CHAPITRE SUIVANT →":"MODULE SUIVANT →"}</button>}
                      {isLast&&<div style={{color:"#00ff88",fontSize:13,fontWeight:"bold"}}>🎓 FORMATION COMPLÈTE TERMINÉE !</div>}
                    </div>
                  )}
                </div>
                <button onClick={()=>setView("learn")} style={{background:"transparent",border:"1px solid #2a2a3a",borderRadius:6,color:"#666",cursor:"pointer",padding:"7px 14px",fontFamily:"monospace",fontSize:9}}>← Retour au cours</button>
              </>
            )}
          </div>

          {/* Footer */}
          <div style={{borderTop:"1px solid rgba(255,255,255,0.04)",padding:"8px 28px",display:"flex",justifyContent:"space-between",background:"#06060e",marginTop:20}}>
            <span style={{fontSize:8,color:"#1a1a1a"}}>ASHRAE TC9.9 • EN 1886 • EN 50600 • DÉCRET 2015-1334 • NF EN 378 • EN 779</span>
            <span style={{fontSize:8,color:"#1a1a1a"}}>Formation Technicien CVC — Niveau II/III</span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
